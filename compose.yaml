services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    container_name: telegram-llm-bot-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - type: bind
        source: .tmp/minio
        target: /data
    restart: "no"

  base-chatbot:
    build:
      context: .
      dockerfile: src/telegram_llm_bot/bots/base_chatbot/Dockerfile
    command: poetry run telegram-llm-bot
    container_name: base-chatbot
    env_file:
      - .env
      - bot.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio
    volumes:
      - type: bind
        source: src/telegram_llm_bot/logs
        target: /app/src/telegram_llm_bot/logs
      - type: bind
        source: .tmp
        target: /app/.tmp
    restart: "no"
    healthcheck:
      test: ["CMD", "poetry", "run", "telegram-llm-bot-smoke"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
