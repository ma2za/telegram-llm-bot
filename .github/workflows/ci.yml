name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install

      - name: Create smoke env
        run: |
          poetry run telegram-llm-bot-init --force
          echo "TELEGRAM_BOT_TOKEN=123456:ci-dummy-token" >> bot.env

      - name: Run unit tests
        run: poetry run python -m unittest

      - name: Run smoke check
        run: poetry run telegram-llm-bot-smoke

      - name: Run config doctor
        run: poetry run telegram-llm-bot-doctor

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Run Ruff lint
        run: poetry run ruff check .

      - name: Run Ruff format check
        run: poetry run ruff format --check .

      - name: Compile Python files
        run: poetry run python -m compileall -q src tests

      - name: Check installed dependencies
        run: poetry run python -m pip check

      - name: Check package metadata
        run: poetry check
